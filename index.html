<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b3556" />
    <title>OAP 2026 · Gestión de Jornadas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="auth-gate" id="authGate">
      <div class="auth-decoration auth-decoration-one"></div>
      <div class="auth-decoration auth-decoration-two"></div>
      <div class="auth-card">
        <div class="auth-brand">
          <img class="brand-mark brand-logo" src="logo-ccc.png" alt="Cámara de Comercio de Ceuta" />
          <div>
            <p class="eyebrow">Cámara de Comercio de Ceuta</p>
            <h1>Gestión de jornadas</h1>
          </div>
        </div>
        <div id="authContent"></div>
      </div>
    </section>

    <div class="app-shell" id="appShell" hidden>
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <img class="brand-mark brand-logo" src="logo-ccc.png" alt="Cámara de Comercio de Ceuta" />
          <div>
            <strong>Jornadas CCC</strong>
            <span>Acciones 2026</span>
          </div>
        </div>

        <nav class="main-nav" aria-label="Navegación principal">
          <button class="nav-item active" data-view="dashboard">
            <span aria-hidden="true">⌂</span> Resumen
          </button>
          <button class="nav-item" data-view="events">
            <span aria-hidden="true">▣</span> Jornadas
          </button>
          <button class="nav-item" data-view="calendar">
            <span aria-hidden="true">▦</span> Calendario
          </button>
          <button class="nav-item" data-view="budget">
            <span aria-hidden="true">€</span> Presupuesto
          </button>
          <button class="nav-item" data-view="contacts">
            <span aria-hidden="true">◎</span> Contactos
          </button>
          <button class="nav-item" data-view="data">
            <span aria-hidden="true">⇅</span> Datos y copias
          </button>
          <button class="nav-item" data-view="users" id="usersNav" hidden>
            <span aria-hidden="true">♙</span> Usuarios
          </button>
        </nav>

        <div class="sidebar-note">
          <span class="status-dot"></span>
          <div>
            <strong>Proyecto independiente</strong>
            <small>No modifica el Excel original</small>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <button class="icon-button menu-button" id="menuToggle" aria-label="Abrir menú">☰</button>
          <div>
            <p class="eyebrow">Oficina Acelera Pyme · Ceuta</p>
            <h1 id="viewTitle">Resumen anual</h1>
          </div>
          <div class="topbar-actions">
            <span class="local-badge" id="currentUserBadge">Sesión segura</span>
            <button class="secondary-button theme-button" id="themeButton">◐ Tema</button>
            <button class="secondary-button logout-button" id="logoutButton">Salir</button>
            <button class="primary-button" id="quickAddEvent">+ Nueva jornada</button>
          </div>
        </header>

        <section id="appView" class="view-container" aria-live="polite"></section>
      </main>
    </div>

    <div class="modal-backdrop" id="modalBackdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header class="modal-header">
          <div>
            <p class="eyebrow" id="modalEyebrow">Jornadas CCC</p>
            <h2 id="modalTitle">Editar</h2>
          </div>
          <button class="icon-button" id="closeModal" aria-label="Cerrar">×</button>
        </header>
        <div id="modalBody" class="modal-body"></div>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
